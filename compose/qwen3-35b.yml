services:
  llama-server:
    command: >
      -m /models/Qwen3.6-35B-A3B/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
      --port 8080 --host 0.0.0.0
      --ctx-size 65536
      -n 8192
      --n-gpu-layers 40
      --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0
      --parallel 1
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-ram 4096
      --flash-attn on
